<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Claude Context Visualizer</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0A0A0F 0%, #13111C 50%, #0D0B14 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #F1F0F5;
    }
    .container { text-align: center; padding: 40px 20px; }
    h1 {
      font-size: 4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #8B5CF6, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 0 0 12px;
    }
    p { color: #9893A6; font-size: 1.1rem; margin: 0 0 24px; }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 12px;
      color: #8B5CF6;
      text-decoration: none;
      font-weight: 600;
      transition: all 150ms ease;
    }
    a:hover {
      background: rgba(139, 92, 246, 0.25);
      border-color: rgba(139, 92, 246, 0.5);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist. The context window might be full.</p>
    <a href="./">Back to Visualizer</a>
  </div>
</body>
</html>
